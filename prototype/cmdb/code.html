<!DOCTYPE html>

<html class="light" lang="en"><head>

<style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen">
<main class="flex min-h-screen">
<!-- Left Side: Visual/Architectural Section -->
<section class="hidden lg:flex w-1/2 relative overflow-hidden bg-primary-container items-center justify-center">
<!-- Decorative Architectural Grid/Pattern -->
<div class="absolute inset-0 opacity-20 pointer-events-none">
<div class="absolute inset-0" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 40px 40px;"></div>
</div>
<div class="relative z-10 flex flex-col items-center text-center p-12 max-w-2xl">
<!-- High-Tech Architectural Logo/Illustration Placeholder -->
<div class="mb-12 rounded-full p-8 bg-white/10 backdrop-blur-xl border border-white/20">
<span class="material-symbols-outlined text-white text-8xl" style="font-variation-settings: 'wght' 200;">
                        architecture
                    </span>
</div>
<h1 class="font-headline text-5xl font-extrabold text-white tracking-tighter mb-6">
                    CMDB
                </h1>
<p class="text-white/80 font-headline text-xl font-medium tracking-tight">
                    The Digital Architect: Engineering the Infrastructure of Tomorrow
                </p>
<!-- Abstract Technical Graphic -->
<div class="mt-16 w-full h-64 relative">
<img class="w-full h-full object-cover rounded-xl mix-blend-screen opacity-50 grayscale contrast-125" data-alt="Abstract glowing blue digital circuit board lines representing complex data architecture and network connectivity in a high-tech setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCjbKQArqtnJsAVEiU8VUHJq7Tkk5XQ84RHfXKuh0ZV-Ya5NTtiqUYEhqPZyiXpDZ8gMaGi4t4N0mSmd2Hhf8QD_uetNr1y1S9IfJgZKExF5JwxCHhaW4P5gQ9-pYIS0rvNDedqbzNV2b4gsMIR0wNNBxFm-7ktnGxd-70RkbcGwy0UuYfvxCP8Kj5v6ibq6dttF7kW91ZNi4vsWXy77YAftDNVa2crGaCUTme-48GVfjb1VcjblqUXx5dT74it4DYBudAdh5imfA"/>
</div>
</div>
<!-- Bottom Brand Accents -->
<div class="absolute bottom-10 left-10 flex items-center gap-4">
<div class="w-12 h-1 bg-white/40 rounded-full"></div>
<span class="text-white/40 font-headline font-bold text-xs tracking-widest uppercase">Infrastructure Engine v4.0</span>
</div>
</section>
<!-- Right Side: Login Form Section -->
<section class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 md:p-24 bg-surface">
<div class="w-full max-w-[420px]">
<!-- Header & Language Selector -->
<div class="flex justify-between items-start mb-16">
<div>
<h2 class="font-headline text-3xl font-bold text-on-surface tracking-tight mb-2">欢迎回来</h2>
<p class="text-on-surface-variant text-sm">进入您的资产管理控制台。</p>
</div>
<div class="relative group">
<button class="flex items-center gap-1 text-xs font-medium text-on-surface-variant hover:text-primary transition-colors py-1 px-2 rounded-lg bg-surface-container-low">
<span class="material-symbols-outlined text-[16px]">language</span>
                            简体中文
                            <span class="material-symbols-outlined text-[16px]">expand_more</span>
</button>
</div>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Username Input -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1" for="username">用户名</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">person</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-lowest border-none rounded-xl text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" id="username" name="username" placeholder="请输入您的ID或邮箱" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="password">密码</label>
<a class="text-xs font-medium text-primary hover:underline transition-all" href="#">忘记密码？</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-3.5 bg-surface-container-lowest border-none rounded-xl text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center px-1">
<input class="w-4 h-4 text-primary bg-surface-container-lowest border-outline-variant rounded focus:ring-primary/20" id="remember" name="remember" type="checkbox"/>
<label class="ml-3 text-sm text-on-surface-variant font-medium" for="remember">记住该设备</label>
</div>
<!-- Login Button -->
<button class="w-full py-4 px-6 bg-gradient-to-r from-primary to-primary-container text-white font-headline font-bold rounded-xl shadow-lg shadow-primary/20 hover:shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">立即登录 <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span></button>
</form>
<!-- Footer Links -->
<div class="mt-12 pt-8 flex flex-col items-center gap-4 text-center">
<p class="text-sm text-on-surface-variant font-medium">需要系统权限？ <a class="text-primary hover:underline ml-1" href="#">请联系系统管理员</a></p>
<div class="flex items-center gap-6 mt-4">
<a class="text-xs text-outline hover:text-on-surface transition-colors" href="#">安全策略</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="text-xs text-outline hover:text-on-surface transition-colors" href="#">服务条款</a>
</div>
</div>
</div>
</section>
</main>
<!-- Background Decorative Elements for Right Side -->
</body></html>
