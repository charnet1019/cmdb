<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/vite.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMDB - Configuration Management Database</title>
    <!-- Critical CSS -->
    <style>
      /* Prevent FOUC - hide app until Vue is ready */
      [v-cloak] { display: none !important; }

      /* Initially hide the app element until Vue is ready */
      #app {
        display: none;
        min-height: 100vh;
      }

      /* CSS Reset */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* Root Variables */
      :root {
        --header-height: 56px;
        --sidebar-width: 200px;
        --sidebar-collapsed-width: 56px;
      }

      /* Base styles */
      html, body { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #f7f9fc;
        color: #0f172a;
        -webkit-font-smoothing: antialiased;
      }
      #app { min-height: 100vh; }

      /* Layout Classes */
      .layout-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--header-height);
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        background-color: #ffffff;
        border-bottom: 1px solid #f1f5f9;
      }

      .layout-sidebar {
        position: fixed;
        left: 0;
        top: var(--header-height);
        height: calc(100vh - var(--header-height));
        z-index: 40;
        background-color: #ffffff;
        border-right: 1px solid #f1f5f9;
        overflow-y: auto;
        transition: width 0.3s ease;
      }
      .layout-sidebar-expanded { width: var(--sidebar-width); }
      .layout-sidebar-collapsed { width: var(--sidebar-collapsed-width); }

      .layout-main {
        padding-top: var(--header-height);
        min-height: 100vh;
        background-color: #f7f9fc;
        transition: margin-left 0.3s ease;
      }
      .layout-main-expanded { margin-left: var(--sidebar-width); }
      .layout-main-collapsed { margin-left: var(--sidebar-collapsed-width); }

      /* Nav items - defined in main.css via Tailwind */

      /* Responsive helpers */
      .user-info-desktop {
        display: none;
      }
      @media (min-width: 768px) {
        .user-info-desktop {
          display: block;
        }
      }

      /* Loading indicator shown while Vue initializes */
      #app-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #f7f9fc;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      #app-loading.hidden { display: none; }
    </style>
  </head>
  <body>
    <!-- Loading indicator - will be hidden by Vue when ready -->
    <div id="app-loading">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div style="width: 32px; height: 32px; background: linear-gradient(to bottom right, #005daa, #0075d5); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
          <span style="color: white; font-weight: 700; font-size: 14px;">C</span>
        </div>
        <span style="font-size: 18px; font-weight: 700; color: #0f172a;">CMDB</span>
      </div>
    </div>
    <div id="app" v-cloak></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
