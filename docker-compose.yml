services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cmdb}
      POSTGRES_USER: ${POSTGRES_USER:-cmdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cmdb_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  cmdb-backend:
    image: cmdb-backend:latest
    build:
      context: ./backend
    environment:
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cmdb}:${POSTGRES_PASSWORD:-cmdb_password}@postgres:5432/${POSTGRES_DB:-cmdb}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-jwt-secret-key-before-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-this-encryption-key-before-production}
      CMDB_INITIAL_ADMIN_PASSWORD: ${CMDB_INITIAL_ADMIN_PASSWORD:-ChangeMe123}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost","http://127.0.0.1"]}
      UPLOAD_DIR: /opt/upload
    volumes:
      - backend-uploads:/opt/upload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  cmdb-frontend:
    image: cmdb-frontend:latest
    build:
      context: ./frontend
    depends_on:
      cmdb-backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  backend-uploads:
